services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gamesense
      POSTGRES_PASSWORD: gamesense
      POSTGRES_DB: gamesense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamesense"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./localstack-init.sh:/etc/localstack/init/ready.d/init.sh
      - localstack_data:/var/lib/localstack

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../apps/api/.env.dev
    environment:
      DATABASE_URL: postgres://gamesense:gamesense@postgres:5432/gamesense?sslmode=disable
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      localstack:
        condition: service_started
  worker:
    build:
      context: ../../apps/worker
      dockerfile: Dockerfile
    env_file:
      - ../../apps/worker/.env.dev
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      localstack:
        condition: service_started
    volumes:
      - ../../apps/worker:/app
      - worker_artifacts:/artifacts/local
    command: python -m worker.main

volumes:
  postgres_data:
  qdrant_data:
  localstack_data:
  worker_artifacts:
